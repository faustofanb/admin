# ===================================================================
# 开发环境配置 (application-dev.yaml)
# ===================================================================
server:
  port: 80
  shutdown: immediate
  max-http-request-header-size: 16KB

spring:
  # --- 数据源 ---
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://127.0.0.1:5432/admin
    username: admin
    password: password

  # --- Liquibase (开发环境关闭) ---
  liquibase:
    enabled: false
    drop-first: false
    contexts: dev

  # --- Redis ---
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      ssl:
        enabled: false

  # --- Redisson ---
  redisson:
    enabled: true
    mode: SINGLE
    pool-size: 64
    min-idle-size: 10
    connect-timeout: 10000
    timeout: 3000
    retry-attempts: 3
    retry-interval: 1500

# ===================================================================
# Jimmer (开发环境)
# ===================================================================
jimmer:
  show-sql: false
  pretty-sql: false
  inline-sql-variables: false
  # 开启缓存
  cache:
    enabled: true

# ===================================================================
# P6Spy SQL 日志 (开发环境启用)
# ===================================================================
decorator:
  datasource:
    p6spy:
      enable-logging: true
      multiline: true
      logging: slf4j

# ===================================================================
# PowerJob (开发环境关闭)
# ===================================================================
powerjob:
  worker:
    enabled: false

# ===================================================================
# Actuator (开发环境全开)
# ===================================================================
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false

# ===================================================================
# 日志配置 (开发环境)
# ===================================================================
logging:
  pattern:
    console: "%d{HH:mm:ss} %clr(%-5level) %clr([%15.15thread]){faint} %clr(%-40.40logger{39}){cyan} : %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%15.15thread] %-40.40logger{39} : %msg%n"
  level:
    root: INFO
    liquibase: WARN
    org.springframework.boot: INFO
    # 隐藏 LiteFlow 相关的 BeanPostProcessor 警告（这是框架内部的 Bean 初始化顺序问题，不影响功能）
    "[org.springframework.context.support.PostProcessorRegistrationDelegate$BeanPostProcessorChecker]": OFF
    org.springframework.context.annotation.ConfigurationClassPostProcessor: ERROR
    org.springframework.security: WARN
    org.apache.catalina: WARN
    org.apache.tomcat: WARN
    com.zaxxer.hikari: INFO
    org.babyfish.jimmer.sql: WARN
    p6spy: INFO
    io.github.faustofan.admin: DEBUG
    org.apache.pulsar: DEBUG
    org.springframework.pulsar: DEBUG

# ===================================================================
# 应用配置 (开发环境)
# ===================================================================
app:
  cache:
    redis:
      enabled: true
  messaging:
    pulsar:
      enabled: false
  http-log:
    enabled: true
    mask-enabled: false
    minimum-status: 0

