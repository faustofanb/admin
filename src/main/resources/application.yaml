# ===================================================================
# 通用配置 (所有环境共享)
# ===================================================================
spring:
  profiles:
    active: dev
  application:
    name: admin-backend

  # --- 虚拟线程 (JDK 21+) ---
  threads:
    virtual:
      enabled: true
      name-prefix: biz-virt-

  # --- JSON 序列化 (Jackson) ---
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    time-zone: Asia/Shanghai

  # --- HikariCP 连接池通用配置 ---
  datasource:
    hikari:
      pool-name: AdminHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000
      auto-commit: true

  # --- Liquibase 通用配置 ---
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    database-change-log-table: DATABASECHANGELOG
    database-change-log-lock-table: DATABASECHANGELOGLOCK
    default-schema: public
    liquibase-schema: public

# ===================================================================
# ORM 框架 (Jimmer)
# ===================================================================
jimmer:
  language: kotlin
  dialect: org.babyfish.jimmer.sql.dialect.PostgresDialect
  database-validation-mode: none
  executor-context-prefixes:
    - io.github.faustofan.admin
  trigger-type: transaction_only
  client:
    ts:
      path: /ts.zip

# ===================================================================
# 文档配置 (Knife4j / SpringDoc)
# ===================================================================
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: true
    path: /openapi.yml

# ===================================================================
# 应用自定义配置
# ===================================================================
app:
  # 安全配置
  security:
    white-list:
      - /openapi.yml
      - /ts.zip
      - /jimmer-client/**
      - /doc.html
      - /assets/**

  # HTTP 请求/响应日志配置
  http-log:
    max-body-size: 8192
    include-paths:
      - /api/**
    exclude-paths:
      - /actuator/**
      - /openapi.yml
      - /ts.zip
      - /doc.html
      - /assets/**
      - /favicon.ico
    sensitive-headers:
      - authorization
      - x-auth-token
      - cookie
    sensitive-fields:
      - password
      - passwordHash
      - newPassword
      - accessToken
      - refreshToken
      - token
      - secret
