# ===================================================================
# 通用配置 (所有环境共享)
# ===================================================================
spring:
  profiles:
    active: dev
  application:
    name: admin-backend

  # --- 虚拟线程 (JDK 21+) ---
  threads:
    virtual:
      enabled: true
      name-prefix: biz-virt-

  # --- JSON 序列化 (Jackson) ---
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    time-zone: Asia/Shanghai

  # --- HikariCP 连接池通用配置 ---
  datasource:
    hikari:
      pool-name: AdminHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000
      auto-commit: true

  # --- Liquibase 通用配置 ---
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    database-change-log-table: DATABASECHANGELOG
    database-change-log-lock-table: DATABASECHANGELOGLOCK
    default-schema: public
    liquibase-schema: public

# ===================================================================
# ORM 框架 (Jimmer)
# ===================================================================
jimmer:
  language: kotlin
  dialect: org.babyfish.jimmer.sql.dialect.PostgresDialect
  database-validation-mode: none
  executor-context-prefixes:
    - io.github.faustofan.admin
  trigger-type: transaction_only
  client:
    ts:
      path: /ts.zip
  # 缓存配置
  cache:
    enabled: false  # 在 profile 配置中开启

# ===================================================================
# 消息队列 (Pulsar)
# ===================================================================
spring.pulsar:
  client:
    service-url: pulsar://localhost:6650
    operation-timeout: 30s
    connection-timeout: 10s
  producer:
    name: ${spring.application.name}-producer
    send-timeout: 30s
    batching-enabled: true
  consumer:
    subscription:
      name: ${spring.application.name}-subscription
      mode: durable
      type: shared
    dead-letter-policy:
      max-redeliver-count: 3
      dead-letter-topic: persistent://public/default/dlq
  listener:
    concurrency: 4
    observation-enabled: true

# ===================================================================
# 流程编排引擎 (LiteFlow)
# ===================================================================
liteflow:
  #规则文件路径
  rule-source: classpath:flow/*.el.xml
  #-----------------以下非必须-----------------
  #liteflow是否开启，默认为true
  enable: true
  #liteflow的banner打印是否开启，默认为true
  print-banner: false
  #上下文的初始数量槽，默认值为1024，这个值不用刻意配置，这个值会自动扩容
  slot-size: 1024
  #FlowExecutor的execute2Future的线程数，默认为64
  main-executor-works: 64
  #FlowExecutor的execute2Future的自定义线程池Builder，LiteFlow提供了默认的Builder
  main-executor-class: com.yomahub.liteflow.thread.LiteFlowDefaultMainExecutorBuilder
  #自定义请求ID的生成类，LiteFlow提供了默认的生成类
  request-id-generator-class: com.yomahub.liteflow.flow.id.DefaultRequestIdGenerator
  #全局异步节点线程池大小，默认为64
  global-thread-pool-size: 64
  #全局异步节点线程池队列大小，默认为512
  global-thread-pool-queue-size: 512
  #全局异步节点线程池自定义Builder，LiteFlow提供了默认的线程池Builder
  global-thread-pool-executor-class: com.yomahub.liteflow.thread.LiteFlowDefaultGlobalExecutorBuilder
  #异步线程最长的等待时间(只用于when)，默认值为15000
  when-max-wait-time: 15000
  #异步线程最长的等待时间(只用于when)，默认值为MILLISECONDS，毫秒
  when-max-wait-time-unit: MILLISECONDS
  #每个WHEN是否用单独的线程池
  when-thread-pool-isolate: false
  #设置解析模式，一共有三种模式，PARSE_ALL_ON_START | PARSE_ALL_ON_FIRST_EXEC | PARSE_ONE_ON_FIRST_EXEC
  parse-mode: PARSE_ALL_ON_START
  #全局重试次数，默认为0
  retry-count: 0
  #是否支持不同类型的加载方式混用，默认为false
  support-multiple-type: false
  #全局默认节点执行器
  node-executor-class: com.yomahub.liteflow.flow.executor.DefaultNodeExecutor
  #是否打印执行中过程中的日志，默认为true
  print-execution-log: true
  #是否开启本地文件监听，默认为false
  enable-monitor-file: false
  #是否开启快速解析模式，默认为false
  fast-load: false
  #是否开启Node节点实例ID持久化，默认为false
  enable-node-instance-id: false
  #是否开启虚拟线程(只在JDK21+环境有效)，默认为true
  enable-virtual-thread: true
  #简易监控配置选项
  monitor:
    #监控是否开启，默认不开启
    enable-log: false
    #监控队列存储大小，默认值为200
    queue-limit: 200
    #监控一开始延迟多少执行，默认值为300000毫秒，也就是5分钟
    delay: 300000
    #监控日志打印每过多少时间执行一次，默认值为300000毫秒，也就是5分钟
    period: 300000

# ===================================================================
# 文档配置 (Knife4j / SpringDoc)
# ===================================================================
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: true
    path: /openapi.yml

# ===================================================================
# 应用自定义配置
# ===================================================================
app:
  messaging:
    pulsar:
      enabled: true
      default-tenant: public
      default-namespace: default
      event-topic-prefix: domain-events
      dead-letter-topic: dlq
      consumer:
        subscription-prefix: ${spring.application.name}
        concurrency: 4
        max-retries: 3
        ack-timeout-ms: 30000
  # 安全配置
  security:
    white-list:
      - /openapi.yml
      - /ts.zip
      - /jimmer-client/**
      - /doc.html
      - /assets/**

  # HTTP 请求/响应日志配置
  http-log:
    max-body-size: 8192
    include-paths:
      - /api/**
    exclude-paths:
      - /actuator/**
      - /openapi.yml
      - /ts.zip
      - /doc.html
      - /assets/**
      - /favicon.ico
    sensitive-headers:
      - authorization
      - x-auth-token
      - cookie
    sensitive-fields:
      - password
      - passwordHash
      - newPassword
      - accessToken
      - refreshToken
      - token
      - secret
