server:
  port: 8080
spring:
  application:
    name: admin-backend
  profiles:
    active: dev
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:jimmer-demo;database_to_upper=true

jimmer:
  language: kotlin
  database-validation-mode: ERROR
  show-sql: true
  pretty-sql: true
  client:
    ts:
      path: /ts.zip
    openapi:
      path: /openapi.yml
      ui-path: /openapi.html
      properties:
        info:
          title: admin-backend
          description: This is the OpenAPI UI of admin-backend
          version: 0.9.55
