version: '3.8'
services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/workspaces:cached
      - /var/run/docker.sock:/var/run/docker.sock
    command: sleep infinity

  postgresql:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # RocketMQ NameServer
  rmqnamesrv:
    image: apache/rocketmq:5.3.0
    command: sh mqnamesrv
    ports:
      - 9876:9876
    environment:
      - JAVA_OPT_EXT=-Xms512m -Xmx512m

  # RocketMQ Broker
  rmqbroker:
    image: apache/rocketmq:5.3.0
    command: sh mqbroker -n rmqnamesrv:9876 -c /home/rocketmq/rocketmq-5.3.0/conf/broker.conf
    ports:
      - 10911:10911
      - 10909:10909
    environment:
      - NAMESRV_ADDR=rmqnamesrv:9876
      - JAVA_OPT_EXT=-Xms512m -Xmx512m
    depends_on:
      - rmqnamesrv

  # PowerJob Server
  powerjob-server:
    image: powerjob/powerjob-server:latest
    ports:
      - 7700:7700
    environment:
      - JVMOPTIONS=-Xmx512m
      - PARAMS=--spring.profiles.active=product --spring.datasource.core.jdbc-url=jdbc:postgresql://postgresql:5432/powerjob_product --spring.datasource.core.username=admin --spring.datasource.core.password=password --spring.datasource.core.driver-class-name=org.postgresql.Driver
    depends_on:
      - db

